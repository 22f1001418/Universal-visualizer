services:
  - type: web
    name: hackmd-viz-orchestrator
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free               # free has no persistent disk; viz_outputs is
                             # scratch only (each viz is pushed to its GitHub
                             # repo = source of truth), so ephemeral storage is
                             # fine. Note: free spins down on idle (~15min) and
                             # cold-starts on the next request.
    healthCheckPath: /healthz
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        sync: false
      - key: PROGRAM_REPOS
        sync: false
